<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>Typlix Settings</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <svg
          class="logo"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
        <h1>Typlix</h1>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="settings">Settings</button>
        <button class="tab" data-tab="sites">Sites</button>
      </div>

      <div id="settings-panel" class="panel">
        <form id="settings-form">
          <div class="field">
            <label for="provider">Provider</label>
            <select id="provider">
              <option value="openai">OpenAI Compatible</option>
              <option value="anthropic">Anthropic Claude</option>
            </select>
          </div>

          <div id="dynamic-fields"></div>

          <button type="submit" class="save-btn">Save Settings</button>
        </form>
      </div>

      <div id="sites-panel" class="panel hidden">
        <div class="site-toggle-section">
          <div class="site-current">
            <span id="current-site-label">Current site</span>
            <button id="toggle-current-site" class="toggle-btn" title="Toggle Typlix for this site">
              <span class="toggle-track">
                <span class="toggle-thumb"></span>
              </span>
            </button>
          </div>
        </div>

        <div class="disabled-sites-section">
          <label>Disabled sites</label>
          <ul id="disabled-sites-list" class="site-list"></ul>
          <p id="no-disabled-sites" class="muted">No sites disabled</p>
        </div>
      </div>

      <div id="toast" class="toast"></div>
    </div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
