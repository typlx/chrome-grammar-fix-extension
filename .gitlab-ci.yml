default:
  tags:
    - kuber

stages:
  - quality
  - test
  - security
  - build
  - package

# ---------------------------------------------------------------------------
# Quality
# ---------------------------------------------------------------------------

lint:
  stage: quality
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --include=dev
    - npm run lint
    - npm run format:check

# ---------------------------------------------------------------------------
# Test
# ---------------------------------------------------------------------------

test:
  stage: test
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --include=dev
    - npm run test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    when: always

# ---------------------------------------------------------------------------
# Security — GitLab AutoDevOps scanning templates
# ---------------------------------------------------------------------------

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

sast:
  stage: security

secret_detection:
  stage: security

dependency_scanning:
  stage: security

# ---------------------------------------------------------------------------
# Build — multi-browser via build.sh
# ---------------------------------------------------------------------------

build:
  stage: build
  image: node:20-alpine
  needs: [lint, test]
  before_script:
    - apk add --no-cache zip bash
  script:
    - bash scripts/build.sh
  artifacts:
    paths:
      - dist/
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Package — versioned release zips on main / develop / tags
# ---------------------------------------------------------------------------

package:
  stage: package
  image: alpine:latest
  needs: [build]
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  script:
    - ls dist/typlix-chrome.zip dist/typlix-firefox.zip
  artifacts:
    paths:
      - dist/typlix-chrome.zip
      - dist/typlix-firefox.zip
    expire_in: 90 days
