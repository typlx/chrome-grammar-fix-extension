name: Publish to Firefox Add-ons (AMO)

on:
  release:
    types: [published]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev
      - run: npm run lint
      - run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev
      - run: npm run test:coverage

  publish:
    name: Publish to Firefox Add-ons
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: bash scripts/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: typlx-firefox-${{ github.event.release.tag_name }}
          path: dist/typlx-firefox.zip
          retention-days: 90

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign and publish to AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          web-ext sign \
            --source-dir dist/firefox \
            --channel listed \
            --api-key "$WEB_EXT_API_KEY" \
            --api-secret "$WEB_EXT_API_SECRET"
