name: Publish to Chrome Web Store

on:
  release:
    types: [published]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev
      - run: npm run lint
      - run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev
      - run: npm run test:coverage

  publish:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: bash scripts/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: typlx-chrome-${{ github.event.release.tag_name }}
          path: dist/typlx-chrome.zip
          retention-days: 90

      - name: Install chrome-webstore-upload-cli
        run: npm install -g chrome-webstore-upload-cli

      - name: Upload and publish to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_WEBSTORE_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_WEBSTORE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_WEBSTORE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_WEBSTORE_REFRESH_TOKEN }}
        run: chrome-webstore-upload --source dist/typlx-chrome.zip
