name: Bug Report
description: Report a bug with Typlx
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Focus a text field
        3. Click the fix icon
        4. See error
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Brave
        - Edge
        - Firefox
        - Other
    validations:
      required: true
  - type: input
    id: browser-version
    attributes:
      label: Browser version
      placeholder: e.g. 124.0.6367.91
  - type: dropdown
    id: provider
    attributes:
      label: LLM provider
      options:
        - OpenAI
        - Anthropic Claude
        - Ollama (local)
        - LM Studio (local)
        - Other OpenAI-compatible
  - type: textarea
    id: logs
    attributes:
      label: Console errors (if any)
      description: Open DevTools → Console, reproduce the bug, and paste any errors.
      render: text
